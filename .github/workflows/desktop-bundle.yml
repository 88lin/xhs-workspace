name: desktop-bundle

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

concurrency:
  group: desktop-bundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Desktop App
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    outputs:
      desktop_version: ${{ steps.release_meta.outputs.desktop_version }}
      expected_tag: ${{ steps.release_meta.outputs.expected_tag }}
      release_name: ${{ steps.release_meta.outputs.release_name }}
    permissions:
      contents: read
    env:
      CI: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Validate desktop release metadata
        id: release_meta
        working-directory: apps/desktop
        run: node ./scripts/check-release-version.mjs --github-output

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            librsvg2-dev \
            pkg-config \
            patchelf

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        working-directory: apps/desktop
        run: pnpm typecheck

      - name: Build frontend
        working-directory: apps/desktop
        run: pnpm build:web

      - name: Check Rust formatting
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --all --check

      - name: Check Tauri host
        working-directory: apps/desktop/src-tauri
        run: cargo check --all-targets

      - name: Check Tauri app build without bundles
        working-directory: apps/desktop
        run: pnpm tauri build --ci --no-bundle

  build:
    name: Build ${{ matrix.label }}
    needs: validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      CI: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: Linux
            artifact_name: linux-bundle
          - os: windows-latest
            label: Windows
            artifact_name: windows-bundle
          - os: macos-latest
            label: macOS
            artifact_name: macos-bundle

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libfuse2 \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            librsvg2-dev \
            pkg-config \
            patchelf

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Generate Tauri bundle icons
        working-directory: apps/desktop
        run: pnpm tauri icon ./public/Box.png --output ./src-tauri/icons

      - name: Build desktop bundle
        working-directory: apps/desktop
        run: pnpm tauri build

      - name: Generate bundle manifest and checksums
        working-directory: apps/desktop
        run: node ./scripts/create-bundle-manifest.mjs

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xhs-atelier-v${{ needs.validate.outputs.desktop_version }}-${{ matrix.artifact_name }}
          path: apps/desktop/src-tauri/target/release/bundle/**
          if-no-files-found: error
          compression-level: 6

  release:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    needs:
      - validate
      - build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: desktop-bundles

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.validate.outputs.release_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: desktop-bundles/**/*
